<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇 - 关卡挑战</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --bg: #060d09;
            --fg: #dff5e8;
            --muted: #4a6b56;
            --accent: #00e68a;
            --card: #0c1a13;
            --border: #163326;
            --danger: #ff4757;
            --food: #ff6b35;
            --obstacle: #1e3328;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--bg);
            color: var(--fg);
            min-height: 100vh;
            overflow-x: hidden;
        }
        .font-display { font-family: 'Orbitron', monospace; }

        /* 背景氛围 */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse at 15% 40%, rgba(0,230,138,0.07) 0%, transparent 55%),
                radial-gradient(ellipse at 85% 25%, rgba(0,180,100,0.04) 0%, transparent 45%),
                radial-gradient(ellipse at 50% 90%, rgba(0,230,138,0.03) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }
        .grid-bg {
            background-image:
                linear-gradient(rgba(0,230,138,0.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,230,138,0.025) 1px, transparent 1px);
            background-size: 48px 48px;
        }

        /* 游戏画布容器 */
        .canvas-wrap {
            position: relative;
            display: inline-block;
            border-radius: 12px;
            overflow: hidden;
            box-shadow:
                0 0 40px rgba(0,230,138,0.08),
                0 0 80px rgba(0,230,138,0.04),
                inset 0 0 40px rgba(0,0,0,0.4);
            border: 2px solid var(--border);
        }
        #gameCanvas { display: block; }

        /* 覆盖层 */
        .overlay {
            position: absolute;
            inset: 0;
            background: rgba(6,13,9,0.88);
            backdrop-filter: blur(6px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            transition: opacity 0.3s;
        }
        .overlay.hidden { display: none; }

        /* 按钮 */
        .btn-primary {
            background: linear-gradient(135deg, #00e68a, #00cc7a);
            color: #060d09;
            font-weight: 700;
            padding: 12px 36px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 15px;
            font-family: 'Noto Sans SC', sans-serif;
            transition: all 0.25s;
            letter-spacing: 2px;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(0,230,138,0.3); }
        .btn-primary:active { transform: translateY(0); }
        .btn-primary:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; }

        .btn-secondary {
            background: transparent;
            color: var(--accent);
            font-weight: 500;
            padding: 10px 24px;
            border-radius: 8px;
            border: 1px solid rgba(0,230,138,0.4);
            cursor: pointer;
            font-size: 14px;
            font-family: 'Noto Sans SC', sans-serif;
            transition: all 0.25s;
        }
        .btn-secondary:hover { background: rgba(0,230,138,0.08); border-color: var(--accent); }
        .btn-secondary:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; }

        /* 进度条 */
        .progress-track { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), #00ffaa); border-radius: 3px; transition: width 0.35s ease; }

        /* 关卡卡片 */
        .level-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px 14px;
            cursor: pointer;
            transition: all 0.25s;
            position: relative;
            overflow: hidden;
        }
        .level-card:hover:not(.locked) {
            border-color: var(--accent);
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(0,230,138,0.12);
        }
        .level-card.locked { opacity: 0.35; cursor: not-allowed; }
        .level-card.current { border-color: var(--accent); background: rgba(0,230,138,0.06); }
        .level-card.completed::after {
            content: '';
            position: absolute;
            top: 0; right: 0;
            border-top: 28px solid var(--accent);
            border-left: 28px solid transparent;
            border-radius: 0 10px 0 0;
        }
        .level-card:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

        /* 信息标签 */
        .info-tag {
            background: rgba(0,230,138,0.08);
            border: 1px solid rgba(0,230,138,0.15);
            border-radius: 6px;
            padding: 4px 12px;
            font-size: 13px;
            color: var(--accent);
        }

        /* 虚拟方向键 */
        .d-pad {
            display: grid;
            grid-template-areas: ". up ." "left . right" ". down .";
            gap: 6px;
            width: fit-content;
        }
        .d-pad button {
            width: 58px; height: 58px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--accent);
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.12s;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        .d-pad button:active {
            background: rgba(0,230,138,0.15);
            border-color: var(--accent);
            transform: scale(0.9);
        }
        .d-pad .up { grid-area: up; }
        .d-pad .left { grid-area: left; }
        .d-pad .right { grid-area: right; }
        .d-pad .down { grid-area: down; }

        /* Toast */
        #toastContainer {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .toast-item {
            background: var(--card);
            border: 1px solid var(--accent);
            border-radius: 8px;
            padding: 10px 18px;
            font-size: 14px;
            color: var(--fg);
            box-shadow: 0 4px 24px rgba(0,0,0,0.4);
            animation: toastSlideIn 0.3s ease-out;
        }
        .toast-item.hide { animation: toastSlideOut 0.3s ease-in forwards; }
        @keyframes toastSlideIn { from { transform: translateX(120%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes toastSlideOut { from { transform: translateX(0); opacity: 1; } to { transform: translateX(120%); opacity: 0; } }

        /* 蛇形装饰动画 */
        @keyframes snakeFloat {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-6px); }
        }
        .snake-icon { animation: snakeFloat 3s ease-in-out infinite; display: inline-block; }

        /* 屏幕震动 */
        @keyframes shake {
            0%, 100% { transform: translate(0); }
            20% { transform: translate(-3px, 2px); }
            40% { transform: translate(3px, -2px); }
            60% { transform: translate(-2px, -1px); }
            80% { transform: translate(2px, 1px); }
        }
        .shake { animation: shake 0.25s ease; }

        /* 响应式 */
        @media (max-width: 560px) {
            .canvas-wrap { max-width: calc(100vw - 24px); }
            #gameCanvas { max-width: 100%; height: auto !important; }
        }
        @media (min-width: 561px) {
            .mobile-controls { display: none !important; }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body class="grid-bg">
    <div id="toastContainer" aria-live="polite"></div>

    <main class="relative z-10 flex flex-col items-center px-4 py-6 min-h-screen gap-5">
        <!-- 标题 -->
        <header class="text-center">
            <h1 class="font-display text-2xl md:text-3xl font-black tracking-wider" style="color: var(--accent)">
                <span class="snake-icon"><i class="fas fa-dragon" style="font-size:0.85em"></i></span>
                SNAKE QUEST
            </h1>
            <p class="text-xs mt-1 tracking-widest" style="color: var(--muted)">八关挑战 · 逐步升级</p>
        </header>

        <!-- 关卡信息栏 -->
        <section class="flex flex-wrap items-center justify-center gap-3" aria-label="关卡信息">
            <div class="info-tag font-display text-xs" id="levelTag">第1关</div>
            <div class="info-tag text-xs" id="levelNameTag">初入蛇界</div>
            <div class="info-tag text-xs" id="speedTag">速度 200ms</div>
            <div class="info-tag text-xs" id="obsTag">无障碍</div>
        </section>

        <!-- 分数区 -->
        <section class="flex items-center gap-6" aria-label="分数">
            <div class="text-center">
                <div class="text-xs tracking-wider mb-1" style="color: var(--muted)">得分</div>
                <div class="font-display text-2xl font-bold" style="color: var(--accent)" id="scoreValue">0</div>
            </div>
            <div class="text-center">
                <div class="text-xs tracking-wider mb-1" style="color: var(--muted)">进度</div>
                <div class="font-display text-lg font-bold" style="color: var(--fg)">
                    <span id="foodCount">0</span><span style="color: var(--muted)"> / </span><span id="targetCount">5</span>
                </div>
            </div>
        </section>

        <!-- 进度条 -->
        <div class="w-full max-w-md">
            <div class="progress-track">
                <div class="progress-fill" id="progressFill" style="width: 0%"></div>
            </div>
        </div>

        <!-- 游戏画布 -->
        <div class="canvas-wrap" id="canvasWrap">
            <canvas id="gameCanvas" width="480" height="480"></canvas>
            <div class="overlay" id="overlay"></div>
        </div>

        <!-- 操作按钮 -->
        <section class="flex items-center gap-3" aria-label="游戏控制">
            <button class="btn-primary" id="btnStart" onclick="startGame()" aria-label="开始游戏">
                <i class="fas fa-play mr-2"></i>开始游戏
            </button>
            <button class="btn-secondary" id="btnRestart" onclick="restartLevel()" aria-label="重新开始">
                <i class="fas fa-redo-alt mr-1"></i>重新开始
            </button>
            <button class="btn-secondary" id="btnPause" onclick="togglePause()" aria-label="暂停">
                <i class="fas fa-pause mr-1"></i>暂停
            </button>
        </section>

        <!-- 移动端方向键 -->
        <nav class="mobile-controls" aria-label="方向控制">
            <div class="d-pad">
                <button class="up" onclick="setDir(0,-1)" aria-label="上"><i class="fas fa-chevron-up"></i></button>
                <button class="left" onclick="setDir(-1,0)" aria-label="左"><i class="fas fa-chevron-left"></i></button>
                <button class="right" onclick="setDir(1,0)" aria-label="右"><i class="fas fa-chevron-right"></i></button>
                <button class="down" onclick="setDir(0,1)" aria-label="下"><i class="fas fa-chevron-down"></i></button>
            </div>
        </nav>

        <!-- 关卡选择 -->
        <section class="w-full max-w-lg" aria-label="关卡选择">
            <h2 class="text-sm font-bold tracking-wider mb-3 text-center" style="color: var(--muted)">
                <i class="fas fa-map-signs mr-1"></i>关卡选择
            </h2>
            <div class="grid grid-cols-4 gap-2" id="levelSelect"></div>
        </section>

        <!-- 操作提示 -->
        <footer class="text-center text-xs pb-4" style="color: var(--muted)">
            <p><i class="fas fa-keyboard mr-1"></i>方向键移动 · 空格键暂停 · Esc暂停</p>
        </footer>
    </main>

    <script>
    /* ==================== 常量与配置 ==================== */
    const GRID = 20;          // 网格数
    const CELL = 24;          // 每格像素
    const SIZE = GRID * CELL; // 画布尺寸 480

    // 八个关卡配置：名称、目标食物数、速度、障碍物坐标
    const LEVELS = [
        {
            name: "初入蛇界", target: 5, speed: 200,
            obstacles: []
        },
        {
            name: "小试牛刀", target: 6, speed: 175,
            obstacles: []
        },
        {
            name: "初见障碍", target: 7, speed: 160,
            obstacles: [[14,5],[14,14],[5,4],[5,15]]
        },
        {
            name: "十字路口", target: 8, speed: 145,
            obstacles: [[10,6],[10,7],[10,12],[10,13],[6,10],[7,10],[12,10],[13,10]]
        },
        {
            name: "双重封锁", target: 8, speed: 130,
            obstacles: [[8,3],[8,4],[8,5],[11,14],[11,15],[11,16],[3,8],[4,8],[5,8],[14,11],[15,11],[16,11]]
        },
        {
            name: "蛇形通道", target: 9, speed: 118,
            obstacles: [[5,4],[6,4],[7,4],[8,4],[11,15],[12,15],[13,15],[14,15],[15,6],[15,7],[15,8],[15,9],[4,11],[4,12],[4,13],[4,14]]
        },
        {
            name: "步步惊心", target: 10, speed: 108,
            obstacles: [[7,2],[7,3],[7,4],[12,15],[12,16],[12,17],[2,7],[3,7],[4,7],[15,12],[16,12],[17,12],[9,9],[10,9],[11,9],[9,11],[10,11],[11,11],[7,14],[8,14]]
        },
        {
            name: "终极挑战", target: 12, speed: 95,
            obstacles: [[6,2],[6,3],[6,4],[6,5],[6,6],[13,13],[13,14],[13,15],[13,16],[13,17],[2,6],[3,6],[4,6],[15,13],[16,13],[17,13],[8,8],[9,8],[10,8],[11,8],[8,12],[9,12],[10,12],[11,12]]
        }
    ];

    /* ==================== 游戏状态 ==================== */
    let state = 'menu';        // menu | playing | paused | levelComplete | gameOver | allClear
    let curLevel = 0;          // 当前关卡索引
    let unlocked = 0;          // 已解锁最高关卡索引
    let snake = [];            // 蛇身坐标数组
    let dir = { x: 1, y: 0 }; // 当前方向
    let nextDir = { x: 1, y: 0 }; // 下一帧方向
    let food = null;           // 食物坐标
    let score = 0;
    let eaten = 0;             // 已吃食物数
    let loopTimer = null;      // 游戏循环定时器
    let particles = [];        // 粒子数组
    let foodPulse = 0;         // 食物脉冲计时
    let frameId = null;        // 渲染帧ID

    // Canvas引用
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    /* ==================== 工具函数 ==================== */
    // 绘制圆角矩形路径
    function rrect(x, y, w, h, r) {
        r = Math.min(r, w / 2, h / 2);
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.arcTo(x + w, y, x + w, y + h, r);
        ctx.arcTo(x + w, y + h, x, y + h, r);
        ctx.arcTo(x, y + h, x, y, r);
        ctx.arcTo(x, y, x + w, y, r);
        ctx.closePath();
    }

    // 判断坐标是否在蛇身上
    function isSnake(x, y) {
        return snake.some(s => s.x === x && s.y === y);
    }

    // 判断坐标是否是障碍物
    function isObs(x, y) {
        return LEVELS[curLevel].obstacles.some(o => o[0] === x && o[1] === y);
    }

    // Toast 通知
    function toast(msg) {
        const c = document.getElementById('toastContainer');
        const el = document.createElement('div');
        el.className = 'toast-item';
        el.textContent = msg;
        c.appendChild(el);
        setTimeout(() => { el.classList.add('hide'); }, 2000);
        setTimeout(() => { el.remove(); }, 2300);
    }

    // 画布震动效果
    function shakeCanvas() {
        const wrap = document.getElementById('canvasWrap');
        wrap.classList.add('shake');
        setTimeout(() => wrap.classList.remove('shake'), 260);
    }

    /* ==================== 初始化蛇 ==================== */
    function initSnake() {
        snake = [{ x: 5, y: 10 }, { x: 4, y: 10 }, { x: 3, y: 10 }];
        dir = { x: 1, y: 0 };
        nextDir = { x: 1, y: 0 };
    }

    /* ==================== 食物生成 ==================== */
    function spawnFood() {
        const avail = [];
        for (let x = 0; x < GRID; x++) {
            for (let y = 0; y < GRID; y++) {
                if (!isSnake(x, y) && !isObs(x, y)) avail.push({ x, y });
            }
        }
        if (avail.length === 0) {
            // 没有可用位置，直接过关
            completeLevel();
            return;
        }
        food = avail[Math.floor(Math.random() * avail.length)];
    }

    /* ==================== 粒子系统 ==================== */
    function emitParticles(gx, gy, color1, color2) {
        const cx = gx * CELL + CELL / 2;
        const cy = gy * CELL + CELL / 2;
        for (let i = 0; i < 14; i++) {
            const ang = (Math.PI * 2 * i) / 14 + Math.random() * 0.3;
            const spd = 2 + Math.random() * 3.5;
            particles.push({
                x: cx, y: cy,
                vx: Math.cos(ang) * spd,
                vy: Math.sin(ang) * spd,
                life: 1,
                decay: 0.018 + Math.random() * 0.02,
                size: 2.5 + Math.random() * 3,
                color: Math.random() > 0.5 ? color1 : color2
            });
        }
    }

    function tickParticles() {
        for (let i = particles.length - 1; i >= 0; i--) {
            const p = particles[i];
            p.x += p.vx;
            p.y += p.vy;
            p.vx *= 0.95;
            p.vy *= 0.95;
            p.life -= p.decay;
            if (p.life <= 0) particles.splice(i, 1);
        }
    }

    /* ==================== 游戏逻辑 ==================== */
    function update() {
        dir = { ...nextDir };
        const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

        // 撞墙
        if (head.x < 0 || head.x >= GRID || head.y < 0 || head.y >= GRID) {
            endGame(); return;
        }
        // 撞自己
        if (isSnake(head.x, head.y)) {
            endGame(); return;
        }
        // 撞障碍物
        if (isObs(head.x, head.y)) {
            endGame(); return;
        }

        snake.unshift(head);

        // 吃食物
        if (food && head.x === food.x && head.y === food.y) {
            score += 10 * (curLevel + 1); // 高关卡分值更高
            eaten++;
            emitParticles(food.x, food.y, '#00e68a', '#ff6b35');
            shakeCanvas();
            spawnFood();
            refreshUI();

            if (eaten >= LEVELS[curLevel].target) {
                completeLevel();
                return;
            }
        } else {
            snake.pop();
        }
    }

    function endGame() {
        state = 'gameOver';
        clearInterval(loopTimer);
        emitParticles(snake[0].x, snake[0].y, '#ff4757', '#ff6b35');
        showOverlay('gameOver');
    }

    function completeLevel() {
        state = 'levelComplete';
        clearInterval(loopTimer);
        if (curLevel >= unlocked) {
            unlocked = Math.min(curLevel + 1, LEVELS.length - 1);
        }
        // 庆祝粒子
        for (let i = 0; i < 5; i++) {
            setTimeout(() => {
                emitParticles(
                    Math.floor(Math.random() * GRID),
                    Math.floor(Math.random() * GRID),
                    '#00e68a', '#00ffaa'
                );
            }, i * 120);
        }
        if (curLevel >= LEVELS.length - 1) {
            state = 'allClear';
        }
        showOverlay(curLevel >= LEVELS.length - 1 ? 'allClear' : 'levelComplete');
        buildLevelSelect();
    }

    /* ==================== 绘制 ==================== */
    function draw() {
        // 背景
        ctx.fillStyle = '#080f0b';
        ctx.fillRect(0, 0, SIZE, SIZE);

        // 网格线
        ctx.strokeStyle = 'rgba(0,230,138,0.035)';
        ctx.lineWidth = 0.5;
        for (let i = 0; i <= GRID; i++) {
            ctx.beginPath(); ctx.moveTo(i * CELL, 0); ctx.lineTo(i * CELL, SIZE); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0, i * CELL); ctx.lineTo(SIZE, i * CELL); ctx.stroke();
        }

        drawObstacles();
        drawFood();
        drawSnake();
        drawParticles();
    }

    function drawObstacles() {
        const obs = LEVELS[curLevel].obstacles;
        obs.forEach(([x, y]) => {
            const px = x * CELL, py = y * CELL;
            // 底色
            ctx.fillStyle = '#142820';
            rrect(px + 1, py + 1, CELL - 2, CELL - 2, 4);
            ctx.fill();
            // 内部
            ctx.fillStyle = '#1c3a2c';
            rrect(px + 4, py + 4, CELL - 8, CELL - 8, 3);
            ctx.fill();
            // 顶部高光
            ctx.fillStyle = 'rgba(0,230,138,0.06)';
            ctx.fillRect(px + 4, py + 2, CELL - 8, 3);
        });
    }

    function drawFood() {
        if (!food) return;
        foodPulse += 0.07;
        const pulse = Math.sin(foodPulse) * 0.18 + 0.82;
        const cx = food.x * CELL + CELL / 2;
        const cy = food.y * CELL + CELL / 2;
        const r = Math.max(1, (CELL / 2 - 3) * pulse);

        // 光晕
        const glow = ctx.createRadialGradient(cx, cy, 0, cx, cy, CELL * 1.2);
        glow.addColorStop(0, 'rgba(255,107,53,0.25)');
        glow.addColorStop(0.5, 'rgba(255,107,53,0.06)');
        glow.addColorStop(1, 'rgba(255,107,53,0)');
        ctx.fillStyle = glow;
        ctx.beginPath();
        ctx.arc(cx, cy, CELL * 1.2, 0, Math.PI * 2);
        ctx.fill();

        // 主体
        ctx.beginPath();
        ctx.arc(cx, cy, r, 0, Math.PI * 2);
        const fg = ctx.createRadialGradient(cx - 2, cy - 2, 0, cx, cy, r);
        fg.addColorStop(0, '#ffaa66');
        fg.addColorStop(1, '#ff6b35');
        ctx.fillStyle = fg;
        ctx.fill();

        // 高光
        ctx.beginPath();
        ctx.arc(cx - 2, cy - 3, Math.max(1, r * 0.35), 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255,255,255,0.5)';
        ctx.fill();
    }

    function drawSnake() {
        const len = snake.length;
        // 从尾到头绘制，头部在最上层
        for (let i = len - 1; i >= 0; i--) {
            const seg = snake[i];
            const px = seg.x * CELL, py = seg.y * CELL;
            const t = i / Math.max(1, len - 1); // 0=头 1=尾

            // 颜色渐变
            const g = Math.round(230 - t * 140);
            const b = Math.round(138 - t * 90);
            const r = Math.round(0 + t * 15);

            const margin = i === 0 ? 1 : 2;
            const radius = i === 0 ? 7 : 5;

            // 蛇头发光
            if (i === 0) {
                ctx.shadowColor = 'rgba(0,230,138,0.4)';
                ctx.shadowBlur = 12;
            }

            ctx.fillStyle = `rgb(${r},${g},${b})`;
            rrect(px + margin, py + margin, CELL - margin * 2, CELL - margin * 2, radius);
            ctx.fill();

            if (i === 0) {
                ctx.shadowColor = 'transparent';
                ctx.shadowBlur = 0;
                // 身体花纹（每隔一节稍亮）
            } else if (i % 2 === 0) {
                ctx.fillStyle = `rgba(255,255,255,0.06)`;
                rrect(px + margin + 2, py + margin + 2, CELL - margin * 2 - 4, CELL - margin * 2 - 4, radius - 1);
                ctx.fill();
            }

            // 眼睛
            if (i === 0) drawEyes(seg);
        }
    }

    function drawEyes(head) {
        const cx = head.x * CELL + CELL / 2;
        const cy = head.y * CELL + CELL / 2;
        let e1, e2;
        if (dir.x === 1) { e1 = { x: cx + 4, y: cy - 4 }; e2 = { x: cx + 4, y: cy + 4 }; }
        else if (dir.x === -1) { e1 = { x: cx - 4, y: cy - 4 }; e2 = { x: cx - 4, y: cy + 4 }; }
        else if (dir.y === -1) { e1 = { x: cx - 4, y: cy - 4 }; e2 = { x: cx + 4, y: cy - 4 }; }
        else { e1 = { x: cx - 4, y: cy + 4 }; e2 = { x: cx + 4, y: cy + 4 }; }

        [e1, e2].forEach(e => {
            ctx.fillStyle = '#ffffff';
            ctx.beginPath(); ctx.arc(e.x, e.y, 3, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = '#060d09';
            ctx.beginPath(); ctx.arc(e.x + dir.x * 0.8, e.y + dir.y * 0.8, 1.6, 0, Math.PI * 2); ctx.fill();
        });
    }

    function drawParticles() {
        particles.forEach(p => {
            ctx.globalAlpha = Math.max(0, p.life);
            ctx.fillStyle = p.color;
            ctx.beginPath();
            ctx.arc(p.x, p.y, Math.max(0.5, p.size * p.life), 0, Math.PI * 2);
            ctx.fill();
        });
        ctx.globalAlpha = 1;
    }

    /* ==================== 渲染循环 ==================== */
    function render() {
        tickParticles();
        draw();
        frameId = requestAnimationFrame(render);
    }

    /* ==================== UI 更新 ==================== */
    function refreshUI() {
        document.getElementById('scoreValue').textContent = score;
        document.getElementById('foodCount').textContent = eaten;
        document.getElementById('targetCount').textContent = LEVELS[curLevel].target;
        const pct = Math.min(100, (eaten / LEVELS[curLevel].target) * 100);
        document.getElementById('progressFill').style.width = pct + '%';
    }

    function refreshLevelTags() {
        const lv = LEVELS[curLevel];
        document.getElementById('levelTag').textContent = `第${curLevel + 1}关`;
        document.getElementById('levelNameTag').textContent = lv.name;
        document.getElementById('speedTag').textContent = `速度 ${lv.speed}ms`;
        document.getElementById('obsTag').textContent = lv.obstacles.length === 0 ? '无障碍' : `障碍 ${lv.obstacles.length}个`;
    }

    /* ==================== 覆盖层 ==================== */
    function showOverlay(type) {
        const ov = document.getElementById('overlay');
        ov.classList.remove('hidden');
        ov.innerHTML = '';

        if (type === 'menu') {
            ov.innerHTML = `
                <div class="text-center">
                    <div class="text-5xl mb-4 snake-icon" style="color: var(--accent)"><i class="fas fa-dragon"></i></div>
                    <h2 class="font-display text-3xl font-black mb-1" style="color: var(--accent)">SNAKE QUEST</h2>
                    <p class="text-sm mb-8" style="color: var(--muted)">八关挑战 · 逐步升级</p>
                    <button class="btn-primary" onclick="startGame()" aria-label="开始游戏">
                        <i class="fas fa-play mr-2"></i>开始游戏
                    </button>
                    <p class="text-xs mt-4" style="color: var(--muted)">从已解锁的最高关卡开始</p>
                </div>`;
        } else if (type === 'paused') {
            ov.innerHTML = `
                <div class="text-center">
                    <i class="fas fa-pause-circle text-4xl mb-3" style="color: var(--accent)"></i>
                    <h2 class="font-display text-2xl font-bold mb-5" style="color: var(--accent)">暂停中</h2>
                    <button class="btn-primary mb-3" onclick="resumeGame()" aria-label="继续游戏">
                        <i class="fas fa-play mr-2"></i>继续游戏
                    </button><br>
                    <button class="btn-secondary" onclick="restartLevel()" aria-label="重新开始">
                        <i class="fas fa-redo-alt mr-1"></i>重新开始
                    </button>
                </div>`;
        } else if (type === 'gameOver') {
            ov.innerHTML = `
                <div class="text-center">
                    <i class="fas fa-skull-crossbones text-4xl mb-3" style="color: var(--danger)"></i>
                    <h2 class="font-display text-2xl font-bold mb-2" style="color: var(--danger)">游戏结束</h2>
                    <p class="text-sm mb-1" style="color: var(--muted)">本关得分: <span style="color:var(--fg)">${score}</span></p>
                    <p class="text-sm mb-6" style="color: var(--muted)">进度: ${eaten} / ${LEVELS[curLevel].target}</p>
                    <button class="btn-primary mb-3" onclick="restartLevel()" aria-label="重新开始">
                        <i class="fas fa-redo-alt mr-2"></i>重新开始
                    </button><br>
                    <button class="btn-secondary" onclick="backToMenu()" aria-label="返回菜单">
                        <i class="fas fa-home mr-1"></i>返回菜单
                    </button>
                </div>`;
        } else if (type === 'levelComplete') {
            ov.innerHTML = `
                <div class="text-center">
                    <i class="fas fa-trophy text-4xl mb-3" style="color: #ffd700"></i>
                    <h2 class="font-display text-2xl font-bold mb-1" style="color: var(--accent)">关卡通过</h2>
                    <p class="text-sm mb-1" style="color: var(--fg)">第${curLevel + 1}关 - ${LEVELS[curLevel].name}</p>
                    <p class="text-sm mb-6" style="color: var(--muted)">得分: ${score}</p>
                    <button class="btn-primary mb-3" onclick="nextLevel()" aria-label="下一关">
                        <i class="fas fa-arrow-right mr-2"></i>下一关
                    </button><br>
                    <button class="btn-secondary" onclick="backToMenu()" aria-label="返回菜单">
                        <i class="fas fa-home mr-1"></i>返回菜单
                    </button>
                </div>`;
        } else if (type === 'allClear') {
            ov.innerHTML = `
                <div class="text-center">
                    <i class="fas fa-crown text-5xl mb-3" style="color: #ffd700"></i>
                    <h2 class="font-display text-2xl font-bold mb-2" style="color: #ffd700">全部通关</h2>
                    <p class="text-sm mb-1" style="color: var(--fg)">恭喜你完成了所有八个关卡!</p>
                    <p class="text-sm mb-6" style="color: var(--muted)">最终得分: ${score}</p>
                    <button class="btn-primary mb-3" onclick="backToMenu()" aria-label="返回菜单">
                        <i class="fas fa-home mr-2"></i>返回菜单
                    </button>
                </div>`;
        }
    }

    function hideOverlay() {
        document.getElementById('overlay').classList.add('hidden');
    }

    /* ==================== 关卡选择面板 ==================== */
    function buildLevelSelect() {
        const c = document.getElementById('levelSelect');
        c.innerHTML = '';
        LEVELS.forEach((lv, i) => {
            const ok = i <= unlocked;
            const cur = i === curLevel;
            const done = i < unlocked;
            const card = document.createElement('div');
            card.className = `level-card${!ok ? ' locked' : ''}${cur ? ' current' : ''}${done ? ' completed' : ''}`;
            card.innerHTML = `
                <div class="flex items-center gap-1.5">
                    <span class="font-display text-xs font-bold" style="color:${ok ? 'var(--accent)' : 'var(--muted)'}">${String(i + 1).padStart(2, '0')}</span>
                    <span class="text-xs truncate" style="color:${ok ? 'var(--fg)' : 'var(--muted)'}">${lv.name}</span>
                </div>
                <div class="flex items-center gap-2 mt-1">
                    <span class="text-xs" style="color:var(--muted)">目标${lv.target}</span>
                    ${lv.obstacles.length > 0 ? `<span class="text-xs" style="color:var(--muted)">· ${lv.obstacles.length}障</span>` : ''}
                </div>
                ${!ok ? '<i class="fas fa-lock absolute top-1.5 right-1.5" style="font-size:10px;color:var(--muted)"></i>' : ''}
                ${done ? '<i class="fas fa-check absolute bottom-1 right-1.5" style="font-size:9px;color:var(--accent)"></i>' : ''}
            `;
            if (ok) {
                card.setAttribute('tabindex', '0');
                card.setAttribute('role', 'button');
                card.setAttribute('aria-label', `第${i + 1}关 ${lv.name}`);
                const handler = () => { curLevel = i; startLevel(); };
                card.addEventListener('click', handler);
                card.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); handler(); } });
            }
            c.appendChild(card);
        });
    }

    /* ==================== 游戏控制函数 ==================== */
    function startGame() {
        curLevel = unlocked;
        startLevel();
    }

    function startLevel() {
        state = 'playing';
        score = 0;
        eaten = 0;
        particles = [];
        initSnake();
        spawnFood();
        refreshUI();
        refreshLevelTags();
        buildLevelSelect();
        hideOverlay();
        clearInterval(loopTimer);
        loopTimer = setInterval(() => {
            if (state === 'playing') update();
        }, LEVELS[curLevel].speed);
        toast(`第${curLevel + 1}关 - ${LEVELS[curLevel].name}`);
    }

    function restartLevel() {
        startLevel();
    }

    function togglePause() {
        if (state === 'playing') pauseGame();
        else if (state === 'paused') resumeGame();
    }

    function pauseGame() {
        if (state !== 'playing') return;
        state = 'paused';
        clearInterval(loopTimer);
        showOverlay('paused');
    }

    function resumeGame() {
        state = 'playing';
        hideOverlay();
        loopTimer = setInterval(() => {
            if (state === 'playing') update();
        }, LEVELS[curLevel].speed);
    }

    function nextLevel() {
        if (curLevel < LEVELS.length - 1) {
            curLevel++;
            startLevel();
        }
    }

    function backToMenu() {
        state = 'menu';
        clearInterval(loopTimer);
        buildLevelSelect();
        showOverlay('menu');
    }

    /* ==================== 方向设置（供移动端按钮调用） ==================== */
    function setDir(x, y) {
        if (state === 'menu') { startGame(); return; }
        if (state !== 'playing') return;
        if (x !== 0 && dir.x !== -x) nextDir = { x, y: 0 };
        if (y !== 0 && dir.y !== -y) nextDir = { x: 0, y };
    }

    /* ==================== 键盘监听 ==================== */
    document.addEventListener('keydown', e => {
        const keys = ['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' ', 'Escape'];
        if (keys.includes(e.key)) e.preventDefault();

        if (state === 'playing') {
            switch (e.key) {
                case 'ArrowUp':    if (dir.y !== 1)  nextDir = { x: 0, y: -1 }; break;
                case 'ArrowDown':  if (dir.y !== -1) nextDir = { x: 0, y: 1 };  break;
                case 'ArrowLeft':  if (dir.x !== 1)  nextDir = { x: -1, y: 0 }; break;
                case 'ArrowRight': if (dir.x !== -1) nextDir = { x: 1, y: 0 };  break;
                case ' ':
                case 'Escape': pauseGame(); break;
            }
        } else if (state === 'paused') {
            if (e.key === ' ' || e.key === 'Escape') resumeGame();
        } else if (state === 'menu') {
            if (e.key === ' ' || e.key === 'Enter') startGame();
        } else if (state === 'gameOver') {
            if (e.key === ' ' || e.key === 'Enter') restartLevel();
        } else if (state === 'levelComplete' || state === 'allClear') {
            if (e.key === ' ' || e.key === 'Enter') {
                if (state === 'allClear') backToMenu();
                else nextLevel();
            }
        }
    });

    /* ==================== 触摸滑动支持 ==================== */
    let touchStart = null;
    canvas.addEventListener('touchstart', e => {
        const t = e.touches[0];
        touchStart = { x: t.clientX, y: t.clientY };
    }, { passive: true });
    canvas.addEventListener('touchend', e => {
        if (!touchStart) return;
        const t = e.changedTouches[0];
        const dx = t.clientX - touchStart.x;
        const dy = t.clientY - touchStart.y;
        const minSwipe = 20;
        if (Math.abs(dx) < minSwipe && Math.abs(dy) < minSwipe) return;
        if (Math.abs(dx) > Math.abs(dy)) {
            setDir(dx > 0 ? 1 : -1, 0);
        } else {
            setDir(0, dy > 0 ? 1 : -1);
        }
        touchStart = null;
    }, { passive: true });

    /* ==================== 启动 ==================== */
    function init() {
        canvas.width = SIZE;
        canvas.height = SIZE;
        buildLevelSelect();
        showOverlay('menu');
        render();
    }

    window.addEventListener('load', init);
    </script>
</body>
</html>
